
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1565C0">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>AI Engineering LP</title>
<style>
header{{background:var(--bg-header);padding:12px 14px;padding-top:calc(12px + env(safe-area-inset-top,0px));border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);position:sticky;top:0;z-index:10;}}
.back{{color:var(--accent);font-size:1.3rem;font-weight:700;min-width:36px;min-height:44px;display:flex;align-items:center;-webkit-tap-highlight-color:transparent;}}
.htxt{{flex:1;}}.htxt h1{{font-size:0.9rem;font-weight:800;color:var(--text);}}.htxt p{{font-size:0.67rem;color:var(--text-sub);margin-top:2px;}}
.theme-btn{{background:var(--bg-input);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:0.82rem;cursor:pointer;min-height:36px;flex-shrink:0;-webkit-tap-highlight-color:transparent;}}
.wrap{{max-width:520px;margin:0 auto;padding:14px 14px 76px;}}
.tip{{background:var(--accent-bg);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:10px 14px;margin-bottom:12px;font-size:0.74rem;color:var(--accent);line-height:1.5;}}
.bnav{{position:fixed;bottom:0;left:0;right:0;background:var(--bg-header);border-top:1px solid var(--border);display:flex;justify-content:center;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,0.07);padding-bottom:env(safe-area-inset-bottom,0px);}}
.bnav-inner{{display:flex;width:100%;max-width:520px;}}
.ni{{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-height:52px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity 0.1s;}}
.ni:active{{opacity:0.6;}}
.ni span:first-child{{font-size:1.1rem;line-height:1;}}
.ni span:last-child{{font-size:0.52rem;color:var(--text-sub);font-weight:700;text-transform:uppercase;letter-spacing:0.4px;}}
.ni.active span:last-child{{color:var(--accent);}}
</style>
</head>
<body>
<header>
  <a href="index.html?resume=lp-courses" class="back">&#8592;</a>
  <div class="htxt"><h1>🤖 AI Engineering Roadmap</h1><p>6 months · 40 weeks</p></div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
</header>
<div class="wrap">
<div class="tip">Resume works! Test complete.</div>
</div>
<nav class="bnav">
  <div class="bnav-inner">
    <a href="index.html?resume=lp-courses" class="ni" id="bn-home"><span>🏠</span><span>Home</span></a>
    <a href="claude.html" class="ni" id="bn-claude"><span>🟠</span><span>Claude</span></a>
    <a href="lp-courses.html" class="ni" id="bn-lp"><span>📋</span><span>Courses</span></a>
    <a href="cloud.html" class="ni" id="bn-cloud"><span>☁️</span><span>Cloud</span></a>
    <a href="linux.html" class="ni" id="bn-linux"><span>🐧</span><span>Linux</span></a>
    <a href="python.html" class="ni" id="bn-python"><span>🐍</span><span>Python</span></a>
  </div>
</nav>
<script>
function initTheme(){{var t=localStorage.getItem('theme')||'light';if(t==='dark')document.body.classList.add('dark');updateBtn(t);}}
function toggleTheme(){{var d=document.body.classList.toggle('dark');var t=d?'dark':'light';localStorage.setItem('theme',t);updateBtn(t);}}
function updateBtn(t){{var b=document.getElementById('themeBtn');if(b)b.textContent=t==='dark'?'☀️':'🌙';}}
initTheme();
%JS%
if('serviceWorker' in navigator){{navigator.serviceWorker.register('sw.js');}}
</script>
</body>
</html>
